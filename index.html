<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JSON Formatter</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ===== Theme Variables (OKLCH) ===== */
    :root {
      color-scheme: dark;
      --font-ui: 'Figtree', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;

      /* Surfaces — teal-tinted neutrals, hue 195 */
      --bg-body: oklch(0.16 0.012 195);
      --bg-header: oklch(0.21 0.012 195);
      --bg-input: oklch(0.16 0.012 195);
      --bg-button: oklch(0.24 0.012 195);
      --bg-button-hover: oklch(0.30 0.012 195);
      --bg-primary: oklch(0.55 0.14 195);
      --bg-primary-hover: oklch(0.60 0.14 195);

      /* Borders */
      --border: oklch(0.30 0.010 195);
      --border-button: oklch(0.38 0.010 195);
      --border-search-focus: oklch(0.65 0.14 195);

      /* Text */
      --text: oklch(0.92 0.008 195);
      --text-secondary: oklch(0.70 0.010 195);
      --text-muted: oklch(0.55 0.010 195);
      --text-label: oklch(0.82 0.008 195);
      --text-placeholder: oklch(0.40 0.010 195);

      /* Resizer */
      --resizer: oklch(0.30 0.010 195);
      --resizer-active: oklch(0.65 0.14 195);

      /* Tree */
      --tree-line: oklch(0.30 0.010 195);
      --arrow: oklch(0.60 0.010 195);

      /* Syntax — cohesive, slightly desaturated */
      --key: oklch(0.78 0.09 195);
      --colon: oklch(0.60 0.010 195);
      --string: oklch(0.76 0.11 155);
      --number: oklch(0.78 0.10 80);
      --boolean: oklch(0.74 0.09 340);
      --null: oklch(0.62 0.02 195);
      --symbol: oklch(0.74 0.09 285);
      --meta: oklch(0.55 0.010 195);

      /* Search highlights */
      --highlight-bg: oklch(0.75 0.14 70);
      --highlight-text: oklch(0.18 0.01 195);
      --highlight-current-bg: oklch(0.60 0.14 195);
      --highlight-current-text: oklch(0.98 0.005 195);

      /* Errors */
      --error-text: oklch(0.70 0.16 25);
      --error-bg: oklch(0.22 0.03 25);
      --error-border: oklch(0.30 0.05 25);

      /* Toggle */
      --toggle-bg: oklch(0.30 0.012 195);
      --toggle-active: oklch(0.60 0.14 195);
      --toggle-knob: oklch(0.92 0.008 195);

      /* Links / icon buttons */
      --github-link: oklch(0.60 0.010 195);
      --github-link-hover: oklch(0.92 0.008 195);
      --theme-btn-color: oklch(0.60 0.010 195);
      --theme-btn-hover: oklch(0.92 0.008 195);

      /* Parsed JSON indicator — background tint only, no border-left */
      --parsed-bg: oklch(0.22 0.03 80);
      --parsed-badge: oklch(0.75 0.10 80);
      --parsed-badge-bg: oklch(0.26 0.04 80);
    }

    :root.light {
      color-scheme: light;
      --bg-body: oklch(0.97 0.005 195);
      --bg-header: oklch(0.93 0.008 195);
      --bg-input: oklch(0.99 0.003 195);
      --bg-button: oklch(0.93 0.008 195);
      --bg-button-hover: oklch(0.88 0.010 195);
      --bg-primary: oklch(0.50 0.14 195);
      --bg-primary-hover: oklch(0.45 0.14 195);

      --border: oklch(0.85 0.008 195);
      --border-button: oklch(0.72 0.008 195);
      --border-search-focus: oklch(0.50 0.14 195);

      --text: oklch(0.22 0.012 195);
      --text-secondary: oklch(0.42 0.010 195);
      --text-muted: oklch(0.55 0.008 195);
      --text-label: oklch(0.30 0.010 195);
      --text-placeholder: oklch(0.65 0.008 195);

      --resizer: oklch(0.85 0.008 195);
      --resizer-active: oklch(0.50 0.14 195);

      --tree-line: oklch(0.82 0.008 195);
      --arrow: oklch(0.50 0.010 195);

      --key: oklch(0.42 0.12 195);
      --colon: oklch(0.50 0.008 195);
      --string: oklch(0.42 0.12 155);
      --number: oklch(0.48 0.10 80);
      --boolean: oklch(0.45 0.10 340);
      --null: oklch(0.55 0.02 195);
      --symbol: oklch(0.45 0.10 285);
      --meta: oklch(0.62 0.008 195);

      --highlight-bg: oklch(0.85 0.12 80);
      --highlight-text: oklch(0.20 0.01 195);
      --highlight-current-bg: oklch(0.50 0.14 195);
      --highlight-current-text: oklch(0.98 0.005 195);

      --error-text: oklch(0.48 0.16 25);
      --error-bg: oklch(0.95 0.03 25);
      --error-border: oklch(0.85 0.05 25);

      --toggle-bg: oklch(0.85 0.008 195);
      --toggle-active: oklch(0.50 0.14 195);
      --toggle-knob: oklch(0.99 0.003 195);

      --github-link: oklch(0.50 0.010 195);
      --github-link-hover: oklch(0.22 0.012 195);
      --theme-btn-color: oklch(0.50 0.010 195);
      --theme-btn-hover: oklch(0.22 0.012 195);

      --parsed-bg: oklch(0.95 0.03 80);
      --parsed-badge: oklch(0.45 0.10 80);
      --parsed-badge-bg: oklch(0.90 0.04 80);
    }

    /* ===== Base ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-mono);
      background: var(--bg-body);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ===== Header ===== */
    .header {
      height: 48px;
      background: var(--bg-header);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      flex-shrink: 0;
    }
    .header h1 {
      font-family: var(--font-ui);
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      letter-spacing: -0.01em;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .header h1 span {
      color: var(--text-muted);
      font-weight: 400;
    }
    .home-btn {
      appearance: none;
      background: none;
      border: none;
      color: inherit;
      font: inherit;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s ease-out, color 0.15s ease-out;
      line-height: 1;
    }
    .home-btn:hover {
      background: var(--bg-button-hover);
    }
    .home-btn:focus-visible {
      outline: 2px solid var(--border-search-focus);
      outline-offset: 1px;
    }
    .header .actions {
      display: flex;
      gap: 8px;
      margin-left: auto;
      align-items: center;
    }
    .theme-toggle {
      background: none;
      border: none;
      color: var(--theme-btn-color);
      cursor: pointer;
      display: flex;
      align-items: center;
      padding: 6px;
      border-radius: 6px;
      transition: color 0.15s ease-out;
    }
    .theme-toggle:hover {
      color: var(--theme-btn-hover);
    }
    .github-link {
      color: var(--github-link);
      transition: color 0.15s ease-out;
      display: flex;
      align-items: center;
      padding: 4px;
      border-radius: 6px;
    }
    .github-link:hover {
      color: var(--github-link-hover);
    }

    /* ===== Layout ===== */
    .container {
      display: flex;
      height: calc(100vh - 48px);
    }
    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .panel-left {
      border-right: 1px solid var(--border);
    }
    .panel-header {
      height: 40px;
      background: var(--bg-header);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 8px;
      flex-shrink: 0;
      font-family: var(--font-ui);
      font-size: 13px;
      color: var(--text-secondary);
    }
    .panel-header .label {
      font-weight: 600;
      color: var(--text-label);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* ===== Resizer ===== */
    .resizer {
      width: 4px;
      background: var(--resizer);
      cursor: col-resize;
      flex-shrink: 0;
      transition: background 0.15s ease-out;
    }
    .resizer:hover, .resizer.active {
      background: var(--resizer-active);
    }

    /* ===== Left Panel: Input ===== */
    .input-area {
      flex: 1;
      resize: none;
      border: none;
      background: var(--bg-input);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.65;
      padding: 16px;
      outline: none;
      tab-size: 2;
    }
    .input-area::placeholder {
      color: var(--text-placeholder);
    }

    /* ===== Right Panel: Viewer ===== */
    .toolbar {
      background: var(--bg-header);
      border-bottom: 1px solid var(--border);
      padding: 8px 16px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    button {
      font-family: var(--font-ui);
      border: 1px solid var(--border-button);
      background: var(--bg-button);
      color: var(--text);
      border-radius: 6px;
      padding: 5px 10px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      transition: background 0.12s ease-out, border-color 0.12s ease-out;
    }
    button:hover {
      background: var(--bg-button-hover);
    }
    button:active {
      transform: scale(0.98);
    }
    button.primary {
      background: var(--bg-primary);
      border-color: var(--bg-primary);
      color: oklch(0.98 0.005 195);
    }
    button.primary:hover {
      background: var(--bg-primary-hover);
    }

    /* ===== Search ===== */
    .search-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
    }
    .search-wrap input {
      font-family: var(--font-mono);
      border: 1px solid var(--border-button);
      background: var(--bg-input);
      color: var(--text);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 12px;
      width: 180px;
      outline: none;
      transition: border-color 0.15s ease-out, box-shadow 0.15s ease-out;
    }
    .search-wrap input:focus {
      border-color: var(--border-search-focus);
      box-shadow: 0 0 0 2px oklch(0.60 0.14 195 / 0.15);
    }
    .search-wrap input::placeholder {
      color: var(--text-muted);
    }
    .search-count {
      font-family: var(--font-ui);
      font-size: 11px;
      color: var(--text-muted);
      min-width: 50px;
    }
    .search-nav button {
      padding: 3px 7px;
      font-size: 11px;
    }

    /* ===== Toggle ===== */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-ui);
      font-size: 12px;
      color: var(--text-secondary);
    }
    .toggle-wrap.hidden { display: none; }
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      cursor: pointer;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle .slider {
      position: absolute;
      inset: 0;
      background: var(--toggle-bg);
      border-radius: 20px;
      transition: background 0.15s ease-out;
    }
    .toggle .slider::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      bottom: 3px;
      background: var(--toggle-knob);
      border-radius: 50%;
      transition: transform 0.2s cubic-bezier(0.33, 1, 0.68, 1);
    }
    .toggle input:checked + .slider {
      background: var(--toggle-active);
    }
    .toggle input:checked + .slider::before {
      transform: translateX(16px);
    }

    /* ===== JSON Tree ===== */
    .viewer {
      flex: 1;
      overflow: auto;
      padding: 16px;
      line-height: 1.55;
      font-size: 13px;
    }
    .viewer .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-placeholder);
      font-family: var(--font-ui);
      font-size: 14px;
      gap: 6px;
    }
    .viewer .empty-state .icon {
      font-family: var(--font-mono);
      font-size: 32px;
      opacity: 0.4;
      font-weight: 500;
    }
    .viewer .empty-state .hint {
      font-size: 12px;
      color: var(--text-muted);
    }
    .viewer .error-msg {
      color: var(--error-text);
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
    }
    details {
      margin-left: 16px;
    }
    summary {
      cursor: pointer;
      list-style: none;
    }
    summary::-webkit-details-marker {
      display: none;
    }
    summary::before {
      content: '\25B8';
      margin-right: 6px;
      color: var(--arrow);
      display: inline-block;
      transition: transform 0.12s ease-out;
    }
    details[open] > summary::before {
      content: '\25BE';
    }
    ul {
      list-style: none;
      margin: 4px 0 0 12px;
      padding-left: 12px;
      border-left: 1px dashed var(--tree-line);
    }
    .key { color: var(--key); }
    .colon { color: var(--colon); }
    .string { color: var(--string); }
    .number { color: var(--number); }
    .boolean { color: var(--boolean); }
    .null { color: var(--null); }
    .symbol { color: var(--symbol); }
    .meta { color: var(--meta); }

    /* ===== Parsed JSON string highlight — background tint, no border-left ===== */
    .parsed-json {
      background: var(--parsed-bg);
      border-radius: 4px;
      padding: 2px 6px 2px 8px;
      margin: 2px 0;
    }
    .parsed-json > summary::after {
      content: 'parsed';
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 500;
      color: var(--parsed-badge);
      background: var(--parsed-badge-bg);
      border-radius: 3px;
      padding: 1px 5px;
      margin-left: 6px;
      vertical-align: middle;
    }

    /* ===== Search highlight ===== */
    mark.highlight {
      background: var(--highlight-bg);
      color: var(--highlight-text);
      border-radius: 2px;
      padding: 0 1px;
    }
    mark.highlight.current {
      background: var(--highlight-current-bg);
      color: var(--highlight-current-text);
      box-shadow: 0 0 0 2px oklch(0.60 0.14 195 / 0.35);
    }

    /* ===== Status Bar ===== */
    .status-bar {
      height: 26px;
      background: var(--bg-header);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      font-family: var(--font-ui);
      font-size: 11px;
      color: var(--text-muted);
      gap: 16px;
      flex-shrink: 0;
    }

    /* ===== Scrollbar ===== */
    .viewer::-webkit-scrollbar,
    .input-area::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    .viewer::-webkit-scrollbar-track,
    .input-area::-webkit-scrollbar-track {
      background: transparent;
    }
    .viewer::-webkit-scrollbar-thumb,
    .input-area::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }
    .viewer::-webkit-scrollbar-thumb:hover,
    .input-area::-webkit-scrollbar-thumb:hover {
      background: var(--border-button);
    }

    /* ===== Reduced Motion ===== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>
      <button type="button" class="home-btn" id="home-btn" aria-label="Back to home and clear shared JSON">
        <span>{ }</span>
        JSON Formatter
      </button>
    </h1>
    <div class="actions">
      <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark mode">
        <svg id="icon-moon" height="18" width="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg id="icon-sun" height="18" width="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
      <a href="https://github.com/zjy4fun/json-open" target="_blank" rel="noopener noreferrer" class="github-link" title="View on GitHub">
        <svg height="22" width="22" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
      </a>
    </div>
  </div>

  <div class="container">
    <!-- Left Panel: Input -->
    <div class="panel panel-left" id="panel-left">
      <div class="panel-header">
        <span class="label">Input</span>
        <button id="btn-copy">Copy</button>
        <button id="btn-share">Share</button>
      </div>
      <textarea class="input-area" id="json-input" placeholder="Paste or type JSON here..." spellcheck="false"></textarea>
    </div>

    <!-- Resizer -->
    <div class="resizer" id="resizer"></div>

    <!-- Right Panel: Viewer -->
    <div class="panel panel-right" id="panel-right">
      <div class="toolbar">
        <button id="expand-all">Expand all</button>
        <button id="collapse-all">Collapse all</button>
        <div class="toggle-wrap hidden" id="toggle-wrap" title="Parse embedded JSON strings inside values">
          <span>Parse JSON strings</span>
          <label class="toggle">
            <input type="checkbox" id="deep-parse-toggle" />
            <span class="slider"></span>
          </label>
        </div>
        <div class="search-wrap">
          <input type="text" id="search-input" placeholder="Search..." autocomplete="off" />
          <span class="search-count" id="search-count"></span>
          <span class="search-nav">
            <button id="search-prev" title="Previous (Shift+Enter)">&#9650;</button>
            <button id="search-next" title="Next (Enter)">&#9660;</button>
          </span>
        </div>
      </div>
      <div class="viewer" id="viewer">
        <div class="empty-state">
          <div class="icon">{ }</div>
          <div>Paste or type JSON on the left</div>
          <div class="hint">It will format automatically</div>
        </div>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <span id="status-info">Ready</span>
    <span id="status-size" style="margin-left:auto"></span>
  </div>

  <script>
    // ===== Utility =====
    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;')
    }

    function valueToHtml(value, key) {
      const keyHtml = key === undefined
        ? ''
        : '<span class="key">' + escapeHtml(String(key)) + '</span><span class="colon">: </span>'

      if (value === null) {
        return '<div class="line">' + keyHtml + '<span class="null">null</span></div>'
      }

      const type = typeof value

      if (type === 'string') {
        return '<div class="line">' + keyHtml + '<span class="string">"' + escapeHtml(value) + '"</span></div>'
      }
      if (type === 'number') {
        return '<div class="line">' + keyHtml + '<span class="number">' + value + '</span></div>'
      }
      if (type === 'boolean') {
        return '<div class="line">' + keyHtml + '<span class="boolean">' + value + '</span></div>'
      }

      if (Array.isArray(value)) {
        var isParsedArr = !!value[PARSED_FROM_STRING]
        const children = value
          .map(function (item, idx) { return '<li>' + valueToHtml(item, idx) + '</li>' })
          .join('')
        return '<details open class="' + (isParsedArr ? 'parsed-json' : '') + '">' +
          '<summary>' + keyHtml + '<span class="symbol">[ ]</span> <span class="meta">(' + value.length + ' items)</span></summary>' +
          '<ul>' + children + '</ul>' +
          '</details>'
      }

      if (type === 'object') {
        var isParsedObj = !!value[PARSED_FROM_STRING]
        const entries = Object.entries(value)
        const children = entries
          .map(function (e) { return '<li>' + valueToHtml(e[1], e[0]) + '</li>' })
          .join('')
        return '<details open class="' + (isParsedObj ? 'parsed-json' : '') + '">' +
          '<summary>' + keyHtml + '<span class="symbol">{ }</span> <span class="meta">(' + entries.length + ' keys)</span></summary>' +
          '<ul>' + children + '</ul>' +
          '</details>'
      }

      return '<div class="line">' + keyHtml + '<span>' + escapeHtml(String(value)) + '</span></div>'
    }

    // Sentinel to mark values that were parsed from JSON strings
    var PARSED_FROM_STRING = Symbol('parsed-from-string')

    function deepParseJsonStrings(obj) {
      if (obj === null || obj === undefined) return obj
      if (Array.isArray(obj)) return obj.map(deepParseJsonStrings)
      if (typeof obj === 'object') {
        // Don't re-process already-marked objects
        var result = {}
        for (var k in obj) {
          if (obj.hasOwnProperty(k)) result[k] = deepParseJsonStrings(obj[k])
        }
        if (obj[PARSED_FROM_STRING]) result[PARSED_FROM_STRING] = true
        return result
      }
      if (typeof obj === 'string') {
        var trimmed = obj.trim()
        if ((trimmed[0] === '{' && trimmed[trimmed.length - 1] === '}') ||
            (trimmed[0] === '[' && trimmed[trimmed.length - 1] === ']')) {
          try {
            var parsed = deepParseJsonStrings(JSON.parse(trimmed))
            // Mark the parsed result so we can highlight it
            if (typeof parsed === 'object' && parsed !== null) {
              parsed[PARSED_FROM_STRING] = true
            }
            return parsed
          } catch (e) {
            return obj
          }
        }
      }
      return obj
    }

    function smartParse(input) {
      // Try direct parse
      try {
        return JSON.parse(input)
      } catch (e) { /* continue */ }

      // Try handling serialized JSON strings (double-escaped)
      try {
        var cleaned = input.trim()
        if ((cleaned[0] === '"' && cleaned[cleaned.length - 1] === '"') ||
            (cleaned[0] === "'" && cleaned[cleaned.length - 1] === "'")) {
          cleaned = cleaned.slice(1, -1)
        }
        cleaned = cleaned
          .replace(/\\"/g, '"')
          .replace(/\\\\/g, '\\')
          .replace(/\\n/g, '\n')
          .replace(/\\t/g, '\t')
          .replace(/\\r/g, '\r')
        return JSON.parse(cleaned)
      } catch (e) { /* continue */ }

      // Try recursive parse (multi-level serialization)
      try {
        var result = input.trim()
        var depth = 0
        while (typeof result === 'string' && depth < 5) {
          result = JSON.parse(result)
          depth++
        }
        if (typeof result === 'object' && result !== null) return result
      } catch (e) { /* continue */ }

      throw new Error('Invalid JSON')
    }

    function formatBytes(bytes) {
      if (bytes < 1024) return bytes + ' B'
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB'
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB'
    }

    // ===== Elements =====
    var jsonInput = document.getElementById('json-input')
    var viewer = document.getElementById('viewer')
    var btnCopy = document.getElementById('btn-copy')
    var btnShare = document.getElementById('btn-share')
    var btnExpandAll = document.getElementById('expand-all')
    var btnCollapseAll = document.getElementById('collapse-all')
    var searchInput = document.getElementById('search-input')
    var searchCount = document.getElementById('search-count')
    var searchPrev = document.getElementById('search-prev')
    var searchNext = document.getElementById('search-next')
    var toggleWrap = document.getElementById('toggle-wrap')
    var deepParseToggle = document.getElementById('deep-parse-toggle')
    var statusInfo = document.getElementById('status-info')
    var statusSize = document.getElementById('status-size')
    var panelLeft = document.getElementById('panel-left')
    var resizer = document.getElementById('resizer')
    var homeBtn = document.getElementById('home-btn')

    var currentParsed = null
    var currentDeepParsed = null

    // ===== Core: Format =====
    function doFormat() {
      var input = jsonInput.value.trim()
      if (!input) {
        viewer.innerHTML = '<div class="empty-state"><div class="icon">{ }</div><div>Paste or type JSON on the left</div><div class="hint">It will format automatically</div></div>'
        statusInfo.textContent = 'Ready'
        statusSize.textContent = ''
        toggleWrap.classList.add('hidden')
        clearSearch()
        return
      }

      try {
        currentParsed = smartParse(input)
        currentDeepParsed = deepParseJsonStrings(currentParsed)
        var hasDiff = JSON.stringify(currentParsed) !== JSON.stringify(currentDeepParsed)

        if (hasDiff) {
          toggleWrap.classList.remove('hidden')
        } else {
          toggleWrap.classList.add('hidden')
        }

        renderView()

        // Also auto-format the input
        jsonInput.value = JSON.stringify(currentParsed, null, 2)

        var keys = 0
        try { keys = JSON.stringify(currentParsed).length } catch (e) {}
        statusInfo.textContent = 'Formatted successfully'
        statusSize.textContent = formatBytes(new Blob([input]).size)
      } catch (e) {
        viewer.innerHTML = '<div class="error-msg"><b>Parse Error</b><br>' + escapeHtml(e.message) + '</div>'
        statusInfo.textContent = 'Parse error'
        statusSize.textContent = ''
        toggleWrap.classList.add('hidden')
      }
    }

    function renderView() {
      var showDeep = deepParseToggle.checked
      var obj = showDeep ? currentDeepParsed : currentParsed
      if (!obj) return
      viewer.innerHTML = valueToHtml(obj)
      clearSearch()
      if (searchInput.value.trim()) doSearch()
    }

    // ===== Buttons =====
    btnCopy.addEventListener('click', function () {
      var text = jsonInput.value.trim()
      if (!text) return
      navigator.clipboard.writeText(text).then(function () {
        var orig = btnCopy.textContent
        btnCopy.textContent = 'Copied!'
        setTimeout(function () { btnCopy.textContent = orig }, 1500)
      })
    })

    // ===== Share =====
    btnShare.addEventListener('click', function () {
      var input = jsonInput.value.trim()
      if (!input) return
      try {
        // Validate JSON first
        JSON.parse(input)
      } catch (e) {
        // Try smart parse
        try {
          var parsed = smartParse(input)
          input = JSON.stringify(parsed)
        } catch (e2) {
          statusInfo.textContent = 'Cannot share: invalid JSON'
          return
        }
      }
      var encoded = encodeURIComponent(input)
      var url = location.origin + location.pathname + '#json=' + encoded
      navigator.clipboard.writeText(url).then(function () {
        var orig = btnShare.textContent
        btnShare.textContent = 'Link copied!'
        statusInfo.textContent = 'Share link copied (' + formatBytes(url.length) + ')'
        setTimeout(function () { btnShare.textContent = orig }, 2000)
      })
    })

    // ===== Home =====
    homeBtn.addEventListener('click', function () {
      window.location.assign(location.origin + location.pathname + location.search)
    })

    // Input behavior
    jsonInput.addEventListener('keydown', function (e) {
      // Tab support
      if (e.key === 'Tab') {
        e.preventDefault()
        var start = this.selectionStart
        var end = this.selectionEnd
        this.value = this.value.substring(0, start) + '  ' + this.value.substring(end)
        this.selectionStart = this.selectionEnd = start + 2
      }
    })

    // ===== Expand / Collapse =====
    function getDetails() {
      return Array.from(viewer.querySelectorAll('details'))
    }
    btnExpandAll.addEventListener('click', function () {
      getDetails().forEach(function (d) { d.open = true })
    })
    btnCollapseAll.addEventListener('click', function () {
      getDetails().forEach(function (d) { d.open = false })
    })

    // ===== Deep Parse Toggle =====
    deepParseToggle.addEventListener('change', function () {
      renderView()
    })

    // ===== Search =====
    var highlights = []
    var currentIdx = -1

    function clearSearch() {
      viewer.querySelectorAll('mark.highlight').forEach(function (mark) {
        var parent = mark.parentNode
        parent.replaceChild(document.createTextNode(mark.textContent), mark)
        parent.normalize()
      })
      highlights = []
      currentIdx = -1
      searchCount.textContent = ''
    }

    function doSearch() {
      clearSearch()
      var query = searchInput.value.trim()
      if (!query) return

      var regex = new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi')

      var walker = document.createTreeWalker(viewer, NodeFilter.SHOW_TEXT, null)
      var textNodes = []
      while (walker.nextNode()) textNodes.push(walker.currentNode)

      textNodes.forEach(function (node) {
        var text = node.textContent
        if (!regex.test(text)) return
        regex.lastIndex = 0

        var frag = document.createDocumentFragment()
        var lastIdx = 0
        var match
        while ((match = regex.exec(text)) !== null) {
          if (match.index > lastIdx) {
            frag.appendChild(document.createTextNode(text.slice(lastIdx, match.index)))
          }
          var mark = document.createElement('mark')
          mark.className = 'highlight'
          mark.textContent = match[0]
          frag.appendChild(mark)
          lastIdx = regex.lastIndex
        }
        if (lastIdx < text.length) {
          frag.appendChild(document.createTextNode(text.slice(lastIdx)))
        }
        node.parentNode.replaceChild(frag, node)
      })

      highlights = Array.from(viewer.querySelectorAll('mark.highlight'))
      if (highlights.length > 0) {
        highlights.forEach(function (h) {
          var el = h.closest('details')
          while (el) {
            el.open = true
            el = el.parentElement ? el.parentElement.closest('details') : null
          }
        })
        currentIdx = 0
        requestAnimationFrame(scrollToCurrent)
      }
      updateCount()
    }

    function updateCount() {
      if (highlights.length === 0 && searchInput.value.trim()) {
        searchCount.textContent = 'No match'
      } else if (highlights.length > 0) {
        searchCount.textContent = (currentIdx + 1) + ' / ' + highlights.length
      } else {
        searchCount.textContent = ''
      }
    }

    function scrollToCurrent() {
      highlights.forEach(function (h, i) {
        h.classList.toggle('current', i === currentIdx)
      })
      if (highlights[currentIdx]) {
        var el = highlights[currentIdx].closest('details')
        while (el) {
          el.open = true
          el = el.parentElement ? el.parentElement.closest('details') : null
        }
        highlights[currentIdx].scrollIntoView({ behavior: 'smooth', block: 'center' })
      }
      updateCount()
    }

    function goNext() {
      if (!highlights.length) return
      currentIdx = (currentIdx + 1) % highlights.length
      scrollToCurrent()
    }
    function goPrev() {
      if (!highlights.length) return
      currentIdx = (currentIdx - 1 + highlights.length) % highlights.length
      scrollToCurrent()
    }

    var debounceTimer
    searchInput.addEventListener('input', function () {
      clearTimeout(debounceTimer)
      debounceTimer = setTimeout(doSearch, 200)
    })

    searchInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        e.preventDefault()
        e.shiftKey ? goPrev() : goNext()
      }
      if (e.key === 'Escape') {
        searchInput.value = ''
        clearSearch()
        searchInput.blur()
      }
    })

    searchNext.addEventListener('click', goNext)
    searchPrev.addEventListener('click', goPrev)

    // Ctrl+F / Cmd+F -> focus search
    document.addEventListener('keydown', function (e) {
      if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
        e.preventDefault()
        searchInput.focus()
        searchInput.select()
      }
    })

    // ===== Resizer =====
    ;(function () {
      var startX, startWidth
      resizer.addEventListener('mousedown', function (e) {
        startX = e.clientX
        startWidth = panelLeft.getBoundingClientRect().width
        resizer.classList.add('active')
        document.addEventListener('mousemove', onMouseMove)
        document.addEventListener('mouseup', onMouseUp)
        e.preventDefault()
      })
      function onMouseMove(e) {
        var newWidth = startWidth + (e.clientX - startX)
        var minW = 200
        var maxW = window.innerWidth - 300
        newWidth = Math.max(minW, Math.min(maxW, newWidth))
        panelLeft.style.flex = 'none'
        panelLeft.style.width = newWidth + 'px'
      }
      function onMouseUp() {
        resizer.classList.remove('active')
        document.removeEventListener('mousemove', onMouseMove)
        document.removeEventListener('mouseup', onMouseUp)
      }
    })()

    // ===== Drag & Drop =====
    jsonInput.addEventListener('dragover', function (e) {
      e.preventDefault()
      e.dataTransfer.dropEffect = 'copy'
    })
    jsonInput.addEventListener('drop', function (e) {
      e.preventDefault()
      var file = e.dataTransfer.files[0]
      if (file) {
        var reader = new FileReader()
        reader.onload = function (ev) {
          jsonInput.value = ev.target.result
          doFormat()
        }
        reader.readAsText(file)
      }
    })

    // ===== Auto format on input =====
    var inputDebounceTimer
    jsonInput.addEventListener('input', function () {
      clearTimeout(inputDebounceTimer)
      inputDebounceTimer = setTimeout(function () {
        doFormat()
      }, 200)
    })

    // ===== Load from URL hash =====
    ;(function () {
      function loadFromHash() {
        var hash = location.hash
        if (!hash || !hash.startsWith('#json=')) return
        var encoded = hash.slice(6) // remove '#json='
        try {
          var json = decodeURIComponent(encoded)
          if (json) {
            jsonInput.value = json
            doFormat()
          }
        } catch (e) {
          statusInfo.textContent = 'Failed to load shared JSON'
        }
      }
      loadFromHash()
      window.addEventListener('hashchange', loadFromHash)
    })()

    // ===== Theme Toggle =====
    ;(function () {
      var themeBtn = document.getElementById('theme-toggle')
      var iconMoon = document.getElementById('icon-moon')
      var iconSun = document.getElementById('icon-sun')
      var root = document.documentElement

      function applyTheme(theme) {
        if (theme === 'light') {
          root.classList.add('light')
          iconMoon.style.display = 'none'
          iconSun.style.display = ''
        } else {
          root.classList.remove('light')
          iconMoon.style.display = ''
          iconSun.style.display = 'none'
        }
      }

      // Load saved preference, default to dark
      var saved = localStorage.getItem('json-open-theme') || 'dark'
      applyTheme(saved)

      themeBtn.addEventListener('click', function () {
        var isLight = root.classList.contains('light')
        var newTheme = isLight ? 'dark' : 'light'
        localStorage.setItem('json-open-theme', newTheme)
        applyTheme(newTheme)
      })
    })()
  </script>
</body>
</html>
